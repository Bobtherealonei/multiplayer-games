# nginx.conf — local LB in front of gs1 + gs2 for the multi-instance test rig.
#
# Sticky-by-IP (ip_hash) is the local equivalent of Render's "session
# affinity" toggle for HTTP services. Socket.IO's polling fallback REQUIRES
# this — otherwise a client's polling requests can land on a different
# backend than the one that received their handshake, and the server
# returns 400 "Session ID unknown".

worker_processes 1;

events {
  worker_connections 1024;
}

http {
  upstream game_servers {
    ip_hash;
    server gs1:3000;
    server gs2:3000;
  }

  # Required for Socket.IO websocket upgrade.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://game_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # Long-lived websocket: don't time out idle connections.
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
