# docker-compose.yml — local "is-the-Redis-refactor-actually-correct?" rig.
#
# Spins up:
#   redis              — same image Render uses behind the scenes
#   gs1, gs2           — TWO independent game-server instances on
#                        different ports, both pointing at the same Redis
#   nginx              — round-robin load balancer in front of gs1+gs2,
#                        with sticky-by-IP so a single Socket.IO session
#                        stays glued to ONE backend (matches Render's
#                        session-affinity behaviour).
#
# How to use:
#   1) cp server/.env.example server/.env  (or fill in your keys directly)
#   2) docker compose up --build
#   3) Open ws://localhost:8080 from the iOS sim — connections will be
#      load-balanced between gs1 and gs2. To prove the refactor works,
#      stop ONE of the backends mid-debate; the surviving instance still
#      has every player's game state, queue, and judge cache because it
#      all lives in Redis.
#
# This is NOT used in production — Render runs the server directly from
# the Dockerfile, no compose involved. This file exists purely for local
# verification.

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gs1:
    build: ./server
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - REDIS_KEY_PREFIX=ts:
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - CLIENT_URL=*
      - INSTANCE_NAME=gs1
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"

  gs2:
    build: ./server
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - REDIS_KEY_PREFIX=ts:
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      - CLIENT_URL=*
      - INSTANCE_NAME=gs2
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3002:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - gs1
      - gs2
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  redis-data:
